<body>
    <header>

<nav>

</nav>
    </header>

<main class="formulir">
<h2>Berikan Testmoni Anda</h2>
<form id="formTestimoni">
    <label for="nama">Nama:</label>
<input type="text" id="nama" name="nama" required placeholder="nama lengkap">

<label for="asal">Asal Sekolah:</label>
<input type="text" id="asal" name="asal " required placeholder="asal">

<label for="komunitas">Komunitas Anda:</label>
<input type="text" id="komunitas" name="komunitas" required placeholder="komunitas">

<label for="rating">Rating:</label>
<input type="number" id="rating" name="rating" required placeholder="rating">

<label for="email">Email:</label>
<input type="email" id="email" name="email" required placeholder="email@example.com">

<lebel for="pesan">Testimoni Anda:</lebel>
<textarea id="pesan" name="pesan" required placeholder="Tulis pengalaman Anda..." rows="5"></textarea>

<button type="submit">Kirim Testimoni</button>
</form>
</main>
<footer>
    <p>&copy; 2026 Toko Buku Niqu Alteir</p>
</footer>
<script>
document.getElementById('formTestimoni').addEventListener('submit', function(e) {
    e.preventDefault();

    const nama=document.getElementById('nama').value;
    const asal=document.getElementById('asal').value;
    const komunitas=document.getElementById('komunitas').value;
    const rating=document.getElementById('rating').value;
    const email=document.getElementById('email').value;
    const pesan=document.getElementById('pesan').value;

    const dataBaru={ nama, email, pesan };

    //Ambil list dari localStorage
    const testimoniList= JSON.parse(localStorage.getItem)('testimoniList')|| [];

    //Tambahkan testimoni baru 
     testimoniList.push(dataBaru);

    //Simpan Kembali ke localStorage
    localStorage.setItem('testmoniList',JSON.stringify(testimoniList));

    // Arahkan ke halaman konirmasi
    window.location.href='proses-testimoni.html';
});
</script>
